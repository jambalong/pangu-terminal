<!doctype html>
<html lang="en">
<head>
  <title>The server cannot process the request due to a client error (400 Bad Request)</title>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; }

    :root {
      --ctp-mauve: #cba6f7;
      --ctp-red: #f38ba8;
      --ctp-yellow: #ffe65a;
      --ctp-green: #a6e3a1;
      --ctp-blue: #89b4fa;
      --ctp-teal: #94e2d5;
      --ctp-text: #cdd6f4;
      --ctp-subtext1: #bac2de;
      --ctp-subtext0: #a6adc8;
      --ctp-overlay2: #9399b2;
      --ctp-overlay1: #7f849c;
      --ctp-overlay0: #6c7086;
      --ctp-surface2: #585b70;
      --ctp-surface1: #45475a;
      --ctp-surface0: #313244;
      --ctp-base: #1e1e2e;
      --ctp-mantle: #181825;
      --ctp-crust: #11111b;
      --font-main: 'Oxanium', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --accent: var(--ctp-peach);
    }

    html, body {
      height: 100%;
      background: var(--ctp-crust);
      color: var(--ctp-text);
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100dvh;
      overflow: hidden;
    }

    /* Animated grid background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(250, 179, 135, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(250, 179, 135, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(250, 179, 135, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
      max-width: 800px;
      width: 100%;
      animation: fade-in 0.6s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-code {
      font-family: var(--font-main);
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.02em;
      position: relative;
    }

    .error-code::after {
      content: attr(data-code);
      position: absolute;
      inset: 0;
      color: transparent;
      -webkit-text-stroke: 1px rgba(250, 179, 135, 0.15);
      transform: translate(3px, 3px);
      z-index: -1;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ctp-surface1), var(--accent), var(--ctp-surface1), transparent);
      opacity: 0.6;
    }

    .error-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.8;
    }

    .error-label::before { content: "[ "; }
    .error-label::after  { content: " ]"; }

    .error-title {
      font-family: var(--font-main);
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 700;
      color: var(--ctp-text);
      line-height: 1.3;
    }

    .error-desc {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--ctp-subtext0);
      line-height: 1.7;
      max-width: 80ch;
    }

    .error-desc .prompt {
      color: var(--accent);
      opacity: 0.6;
      user-select: none;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ctp-crust);
      background: var(--accent);
      text-decoration: none;
      padding: 0.6rem 1.4rem;
      border-radius: 0.25rem;
      letter-spacing: 0.05em;
      transition: opacity 0.15s, transform 0.15s;
    }

    .back-link:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .back-link::before { content: "← "; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <main>
    <div class="error-code" data-code="400">400</div>
    <div class="divider"></div>
    <span class="error-label">Not Found</span>
    <h1 class="error-title">The server cannot process the request due to a client error.</h1>
    <p class="error-desc">
      <span class="prompt">$ </span>Please check your request and try again. If you&#39;re the app owner, check the logs.
    </p>
    <a class="back-link" href="/">Go Home</a>
  </main>
</body>
</html>
